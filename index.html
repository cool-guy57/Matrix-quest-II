<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MatrixQuest II: Beyond the Grid</title>
    <style>
        body {
            background-color: #07080e;
            color: #00f0ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 45px rgba(0, 240, 255, 0.35);
            border: 6px solid #16192b;
            background: #020204;
            border-radius: 6px;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        #ui-overlay {
            width: 512px;
            background: #0a0c16;
            color: #a9b1d6;
            box-sizing: border-box;
            padding: 12px;
            border-top: 4px solid #16192b;
            display: grid; 
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            background: #101322;
            color: #00f0ff;
            border: 2px solid #00f0ff;
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            box-shadow: 2px 2px 0px #000;
            transition: all 0.1s ease;
        }

        .btn:hover {
            background: #1d223a;
            color: #ff0055;
            border-color: #ff0055;
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px #000;
        }

        #dialogue-box {
            grid-column: span 2;
            background: #04050a;
            border: 2px solid #16192b;
            padding: 10px;
            min-height: 58px;
            font-size: 12px;
            line-height: 1.4;
            font-weight: bold;
            color: #fff;
            white-space: pre-line;
        }

        #controls-legend {
            margin-top: 15px;
            color: #565f89;
            text-align: center;
            font-size: 12px;
            line-height: 1.6;
        }
    </style>
</head>

const SoundFX = {
    ctx: null,
    init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    play(type) {
        this.init(); if (!this.ctx) return;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination); const now = this.ctx.currentTime;
        switch(type) {
            case 'hit':
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(40, now + 0.12);
                gain.gain.setValueAtTime(0.08, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12); osc.start(now); osc.stop(now + 0.12); break;
            case 'text':
                osc.type = 'triangle'; osc.frequency.setValueAtTime(420, now);
                gain.gain.setValueAtTime(0.02, now); gain.gain.exponentialRampToValueAtTime(0.005, now + 0.03); osc.start(now); osc.stop(now + 0.03); break;
            case 'heal':
                osc.type = 'sine'; osc.frequency.setValueAtTime(523, now); osc.frequency.setValueAtTime(659, now + 0.08); osc.frequency.setValueAtTime(783, now + 0.16);
                gain.gain.setValueAtTime(0.06, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(now); osc.stop(now + 0.3); break;
            case 'levelUp':
                osc.type = 'sine'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(554, now + 0.08); osc.frequency.setValueAtTime(659, now + 0.16); osc.frequency.setValueAtTime(880, now + 0.24);
                gain.gain.setValueAtTime(0.07, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4); osc.start(now); osc.stop(now + 0.4); break;
        }
    }
};

class Monster {
    constructor(speciesName, level = 5) {
        const data = CORE_INDEX[speciesName];
        this.species = speciesName; this.name = data.name; this.type = data.type;
        this.level = level; this.color = data.color; this.moves = [...data.moves]; this.syncRate = data.syncRate;
        this.maxHp = Math.floor((data.baseHp * 2 * level) / 100) + level + 10; this.hp = this.maxHp;
        this.atk = Math.floor((data.baseAtk * 2 * level) / 100) + 5; this.def = Math.floor((data.baseDef * 2 * level) / 100) + 5;
        this.spd = Math.floor((data.baseSpd * 2 * level) / 100) + 5; this.exp = 0; this.expNeeded = Math.pow(this.level, 3);
        this.isOverclocked = false;
        this.status = null; // Status condition e.g. "Glitched"
    }
    gainExp(amount) {
        this.exp += amount; let logString = "";
        while (this.exp >= this.expNeeded) {
            this.level++; this.expNeeded = Math.pow(this.level, 3);
            const data = CORE_INDEX[this.species]; const oldMax = this.maxHp;
            this.maxHp = Math.floor((data.baseHp * 2 * this.level) / 100) + this.level + 10; this.hp += (this.maxHp - oldMax);
            this.atk = Math.floor((data.baseAtk * 2 * this.level) / 100) + 5; this.def = Math.floor((data.baseDef * 2 * this.level) / 100) + 5;
            this.spd = Math.floor((data.baseSpd * 2 * this.level) / 100) + 5;
            logString += `\n${this.name} evolved to Level ${this.level}!`;
            if (data.learnTable[this.level] !== undefined) {
                let targetMove = data.learnTable[this.level];
                if (!this.moves.includes(targetMove)) { this.moves.push(targetMove); logString += `\n[COMPILE SUCCESS]: Learned ${targetMove.toUpperCase()}!`; }
            }
        }
        return logString;
    }
}

const Game = {
    canvas: document.getElementById("gameCanvas"),
    ctx: document.getElementById("gameCanvas").getContext("2d"),
    ui: document.getElementById("ui-overlay"),
    dialogue: document.getElementById("dialogue-box"),
    buttonsContainer: document.getElementById("menu-buttons"),
    
    gameState: "STARTER_SELECT", 
    battleSubState: "MAIN_MENU", keys: {}, inputLock: false,
    currentMapKey: "SECTOR_04", activeMap: null, dialogueQueue: [], currentSpeaker: "", activeInteractingNpc: null,
    playerParty: [], activePlayerMon: null, enemyMon: null, isBossBattle: false, activeBossSpecies: "",
    inventory: { "Nano-Repair": 5, "Link Card": 3, "Override Key": 0 }, linkDataFragments: 35, 
    tileSize: 32, playerGridPos: { x: 4, y: 5 }, pixelPos: { x: 4 * 32, y: 5 * 32 }, moveCooldown: 0, transitionTimer: 0,
    combatLogFeed: "", particles: [],

    init() {
        this.initStarterSelectionScreen();

        window.addEventListener("keydown", e => { 
            const blockedKeys = ["arrowup", "arrowdown", "arrowleft", "arrowright", " "];
            if (blockedKeys.includes(e.key.toLowerCase())) {
                e.preventDefault(); 
            }
            if (e.key === " " || e.key === "Enter") { this.processActionTrigger(); return; }
            this.keys[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === "p" && this.gameState === "OVERWORLD") this.saveProfileToStorage();
        });
        window.addEventListener("keyup", e => { 
            this.keys[e.key.toLowerCase()] = false; 
        });
        this.loop();
    },

    initStarterSelectionScreen() {
        this.gameState = "STARTER_SELECT";
        this.dialogue.innerText = "=== MATRIXQUEST II: REBOOT INITIATED ===\nSelect your next-generation starter core profile:";
        this.buttonsContainer.innerHTML = "";
        this.createStarterSelectionOption("SPARKHOUND [VOLT]", "Sparkhound");
        this.createStarterSelectionOption("NULLSPIDER [AETHER]", "Nullspider");
        this.createStarterSelectionOption("GLITCHFOX II [CYBER]", "Glitchfox II");
    },

    createStarterSelectionOption(label, speciesKey) {
        const btn = document.createElement("div"); btn.className = "btn"; btn.innerText = label;
        btn.onclick = () => {
            this.playerParty = [new Monster(speciesKey, 5)]; this.activePlayerMon = this.playerParty[0];
            this.activeMap = MAP_DIRECTORY[this.currentMapKey];
            
            this.buttonsContainer.innerHTML = ""; 
            this.gameState = "OVERWORLD";
            this.dialogue.innerText = "Mainframe reboot complete. Welcome to the Undergrid.";
            
            SoundFX.play('levelUp'); 
            this.saveProfileToStorage();
        };
        this.buttonsContainer.appendChild(btn);
    },

    saveProfileToStorage() {
        const saveState = {
            mapKey: this.currentMapKey, gridPos: this.playerGridPos, inventory: this.inventory, shards: this.linkDataFragments,
            party: this.playerParty.map(mon => ({ species: mon.species, level: mon.level, hp: mon.hp, exp: mon.exp, moves: mon.moves }))
        };
        localStorage.setItem("matrixquest2_save", JSON.stringify(saveState)); SoundFX.play('heal');
    },

    processActionTrigger() { 
        if (this.inputLock) return;
        if (this.gameState === "OVERWORLD") this.checkNPCInteraction(); 
        else if (this.gameState === "TEXT_BOX") this.advanceDialogue(); 
    },

    loop() { Game.update(); Game.render(); requestAnimationFrame(Game.loop); },

    update() {
        this.updateParticles();
        if (this.gameState === "OVERWORLD") { this.handleGridMovement(); } 
        else if (this.gameState === "TRANSITION") {
            this.transitionTimer += 4; if (this.transitionTimer >= 100) {
                this.transitionTimer = 0; if (this.pendingMapWarp) this.executeWarpResolution();
                else { this.gameState = "BATTLE"; this.battleSubState = "MAIN_MENU"; this.ui.style.display = "grid"; this.initBattleUI(); }
            }
        }
    },

    spawnImpactParticles(x, y, color) {
        for (let i = 0; i < 12; i++) {
            this.particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6,
                size: Math.random() * 4 + 2,
                color: color,
                life: 20
            });
        }
    },

    updateParticles() {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            let p = this.particles[i];
            p.x += p.vx; p.y += p.vy;
            p.life--;
            if (p.life <= 0) this.particles.splice(i, 1);
        }
    },

    drawParticles() {
        this.particles.forEach(p => {
            this.ctx.fillStyle = p.color;
            this.ctx.fillRect(p.x, p.y, p.size, p.size);
        });
    },

    handleGridMovement() {
        if (!this.activeMap) return;
        const targetX = this.playerGridPos.x * this.tileSize; const targetY = this.playerGridPos.y * this.tileSize;
        if (this.pixelPos.x < targetX) this.pixelPos.x += 4; if (this.pixelPos.x > targetX) this.pixelPos.x -= 4;
        if (this.pixelPos.y < targetY) this.pixelPos.y += 4; if (this.pixelPos.y > targetY) this.pixelPos.y -= 4;
        if (this.pixelPos.x === targetX && this.pixelPos.y === targetY) {
            if (this.moveCooldown > 0) { this.moveCooldown--; return; }
            let nextX = this.playerGridPos.x; let nextY = this.playerGridPos.y;
            
            if (this.keys["arrowup"] || this.keys["w"]) nextY--; 
            else if (this.keys["arrowdown"] || this.keys["s"]) nextY++; 
            else if (this.keys["arrowleft"] || this.keys["a"]) nextX--; 
            else if (this.keys["arrowright"] || this.keys["d"]) nextX++;

            if (nextX !== this.playerGridPos.x || nextY !== this.playerGridPos.y) {
                if (nextY >= 0 && nextY < this.activeMap.layout.length && nextX >= 0 && nextX < this.activeMap.layout[0].length) {
                    let tile = this.activeMap.layout[nextY][nextX]; let npcPresent = this.activeMap.npcs.some(n => n.gridX === nextX && n.gridY === nextY);
                    
                    if (nextY === 0 && this.activeMap.northWarp) {
                        this.pendingMapWarp = this.activeMap.northWarp; this.gameState = "TRANSITION"; this.transitionTimer = 0; return;
                    }
                    if (nextY === this.activeMap.layout.length - 1 || (this.currentMapKey === "SECTOR_05" && nextY === 8)) {
                        if (this.activeMap.southWarp) {
                            if (this.currentMapKey === "SECTOR_04" && this.inventory["Override Key"] <= 0) {
                                this.triggerDialogue("SECURITY BARRIER", ["ACCESS DENIED: OVERCLOCK OVERRIDE KEY ABSENT.", "Defeat Kernel Sentinel in Cyber-Waste to secure access."]);
                                this.moveCooldown = 12; return;
                            }
                            this.pendingMapWarp = this.activeMap.southWarp; this.gameState = "TRANSITION"; this.transitionTimer = 0; return;
                        }
                    }

                    if (tile !== 2 && !npcPresent) {
                        this.playerGridPos.x = nextX; this.playerGridPos.y = nextY; this.moveCooldown = 2; 
                        if (tile === 1 && Math.random() < 0.12) this.triggerBattlePipeline(false); 
                    }
                }
            }
        }
    },

    executeWarpResolution() { 
        const target = this.pendingMapWarp; this.currentMapKey = target.mapKey; this.activeMap = MAP_DIRECTORY[this.currentMapKey]; 
        this.playerGridPos.x = target.spawnX; this.playerGridPos.y = target.spawnY; 
        this.pixelPos.x = target.spawnX * this.tileSize; this.pixelPos.y = target.spawnY * this.tileSize; 
        this.pendingMapWarp = null; this.gameState = "OVERWORLD"; 
        this.keys = {}; 
        this.moveCooldown = 20; 
        this.saveProfileToStorage(); 
    },

    checkNPCInteraction() { 
        if (!this.activeMap) return; 
        if (this.currentMapKey === "SECTOR_04" && this.playerGridPos.y - 1 === 1 && this.playerGridPos.x === 8) { 
            this.executeSanctuaryHeal(); return; 
        } 
        for (let npc of this.activeMap.npcs) {

    drawHumanoidSprite(x, y, color, typeLabel) {

        this.ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
        this.ctx.beginPath();

        this.ctx.fillRect(x + 10, y + 22, 4, 6);
        this.ctx.fillRect(x + 18, y + 22, 4, 6);

        this.ctx.fillStyle = color;
        this.ctx.beginPath();
        this.ctx.moveTo(x + 8, y + 22);
        this.ctx.lineTo(x + 24, y + 22);
        this.ctx.lineTo(x + 22, y + 12 + pulse);
        this.ctx.lineTo(x + 10, y + 12 + pulse);
        this.ctx.closePath();
        this.ctx.fill();

        this.ctx.fillStyle = "#d2d4de";

    drawTilemap() {

                } else if (type === 5) {

                }
            }

        for (let npc of this.activeMap.npcs) { 
            let npcRole = "CIVILIAN";

    },

    drawProceduralMonsterSprite(mon, x, y, size) {
        const scalePulse = Math.sin(Date.now() / 120) * 3;
        this.ctx.save();
        this.ctx.shadowBlur = 20;
        this.ctx.shadowColor = mon.color;

        this.ctx.fillStyle = "rgba(0,0,0,0.3)";
        this.ctx.beginPath();
        this.ctx.ellipse(x + size/2, y + size, size/2, 6, 0, 0, Math.PI*2);
        this.ctx.fill();

        this.ctx.fillStyle = mon.color;
        if (mon.type === "Volt") {
            this.ctx.beginPath();
            this.ctx.moveTo(x + size/2, y);
            this.ctx.lineTo(x + size, y + size/2);
            this.ctx.lineTo(x + size/2 + scalePulse, y + size/2);
            this.ctx.lineTo(x + size/2, y + size);
            this.ctx.lineTo(x, y + size/2);
            this.ctx.lineTo(x + size/2 - scalePulse, y + size/2);
            this.ctx.closePath();
            this.ctx.fill();
        } else if (mon.type === "Aether") {
            this.ctx.beginPath();
            this.ctx.arc(x + size/2, y + size/2, size/2.5 + scalePulse, 0, Math.PI * 2);
            this.ctx.fill();
            this.ctx.strokeStyle = "#ffffff";
            this.ctx.stroke();
        } else if (mon.type === "Plasma") {
            this.ctx.beginPath();
            this.ctx.moveTo(x + size/2, y + scalePulse);
            this.ctx.lineTo(x + size - scalePulse, y + size/2);
            this.ctx.lineTo(x + size/2, y + size - scalePulse);
            this.ctx.lineTo(x + scalePulse, y + size/2);
            this.ctx.closePath();
            this.ctx.fill();
        } else { 
            this.ctx.fillRect(x + scalePulse, y + scalePulse, size - scalePulse*2, size - scalePulse*2);
        }

        this.ctx.fillStyle = "#ffffff";
        this.ctx.beginPath();
        this.ctx.arc(x + size/2, y + size/2, 6, 0, Math.PI*2);
        this.ctx.fill();

        this.ctx.restore();
    },

    drawBattleLayout() {

        if (this.enemyMon && this.enemyMon.isOverclocked) { this.ctx.fillStyle = `rgba(255, 0, 85, ${0.08 + Math.sin(Date.now() / 100) * 0.03})`; this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height); }
        this.ctx.fillStyle = "rgba(0, 240, 255, 0.08)"; this.ctx.beginPath(); this.ctx.ellipse(380, 130, 75, 18, 0, 0, Math.PI * 2); this.ctx.fill(); this.ctx.beginPath(); this.ctx.ellipse(130, 265, 100, 24, 0, 0, Math.PI * 2); this.ctx.fill();
        
        if (this.enemyMon && this.enemyMon.hp > 0) {

    drawUIStatusBlock(mon, x, y, width) {

        let label = mon.isOverclocked ? `[OVERCLOCK] ${mon.name}` : mon.name; this.ctx.fillText(label.toUpperCase(), x + 10, y + 20); this.ctx.fillText(`Lv${mon.level}`, x + width - 45, y + 20);
        this.ctx.fillStyle = "#1b1f35"; this.ctx.fillRect(x + 10, y + 28, width - 20, 8); let ratio = Math.max(0, mon.hp / mon.maxHp); this.ctx.fillStyle = ratio > 0.5 ? "#00f0ff" : ratio > 0.2 ? "#ff9e64" : "#f7768e"; this.ctx.fillRect(x + 10, y + 28, (width - 20) * ratio, 8);
        this.ctx.fillStyle = "#a9b1d6"; this.ctx.font = "10px Courier New"; 
        let statusTag = mon.status ? ` [${mon.status}]` : "";
        this.ctx.fillText(`${mon.hp}/${mon.maxHp} HP [${mon.type}]${statusTag}`, x + 10, y + 48);

    initBattleUI() {
        this.buttonsContainer.innerHTML = "";
        if (this.battleSubState === "MAIN_MENU") {
            this.createMenuButton("EXECUTE ATTACK", () => { this.battleSubState = "FIGHT"; this.initBattleUI(); }); 
            this.createMenuButton("ITEM MATRIX", () => { this.battleSubState = "BAG"; this.initBattleUI(); }); 
            this.createMenuButton("PARTY ROSTER", () => { this.battleSubState = "PARTY"; this.initBattleUI(); });
            if (!this.isBossBattle) this.createMenuButton("ESCAPE LINK", () => this.executeActionTurnStack({ type: 'RUN' })); 
            else this.createMenuButton("[LOCKED]", () => {});
        } else if (this.battleSubState === "FIGHT") {
            this.activePlayerMon.moves.forEach(mKey => { const move = MOVES[mKey]; this.createMenuButton(`${move.name} [${move.type}]`, () => this.executeActionTurnStack({ type: 'MOVE', object: move })); });
            this.createMenuButton("<< CANCEL", () => { this.battleSubState = "MAIN_MENU"; this.initBattleUI(); });
        } else if (this.battleSubState === "BAG") {
            Object.keys(this.inventory).forEach(itemKey => { let count = this.inventory[itemKey]; if (count > 0 && itemKey !== "Override Key") { this.createMenuButton(`${itemKey} (${count})`, () => { if (itemKey === "Link Card") this.executeActionTurnStack({ type: 'CAPTURE', name: itemKey }); else this.executeActionTurnStack({ type: 'ITEM', name: itemKey }); }); } });
            this.createMenuButton("<< CANCEL", () => { this.battleSubState = "MAIN_MENU"; this.initBattleUI(); });
        } else if (this.battleSubState === "PARTY") {

    createMenuButton(text, callback) { const btn = document.createElement("div"); btn.className = "btn"; btn.innerText = text; btn.onclick = () => { if (!this.inputLock) callback(); }; this.buttonsContainer.appendChild(btn); },
    
    executeActionTurnStack(playerAction) { 
        this.inputLock = true; this.buttonsContainer.innerHTML = ""; 
        const enemyMoveKey = this.enemyMon.moves[Math.floor(Math.random() * this.enemyMon.moves.length)]; 
        const enemyAction = { type: 'MOVE', object: MOVES[enemyMoveKey] }; 
        let queue = []; 
        if (playerAction.type === 'ITEM' || playerAction.type === 'CAPTURE' || playerAction.type === 'SWAP' || playerAction.type === 'RUN') { 
            queue = [{ entity: this.activePlayerMon, target: this.enemyMon, action: playerAction }, { entity: this.enemyMon, target: this.activePlayerMon, action: enemyAction }]; 
        } else { 
            if (this.activePlayerMon.spd >= this.enemyMon.spd) { 
                queue = [{ entity: this.activePlayerMon, target: this.enemyMon, action: playerAction }, { entity: this.enemyMon, target: this.activePlayerMon, action: enemyAction }]; 
            } else { 
                queue = [{ entity: this.enemyMon, target: this.activePlayerMon, action: enemyAction }, { entity: this.activePlayerMon, target: this.enemyMon, action: playerAction }]; 
            } 
        } 
        this.processQueueStep(queue, 0); 
    },

    processQueueStep(queue, index) {
        if (index >= queue.length) { this.evaluateOverclockTriggers(); return; } 
        const step = queue[index]; 
        if (step.entity !== this.enemyMon) step.entity = this.activePlayerMon; 
        if (step.target !== this.enemyMon) step.target = this.activePlayerMon; 
        if (step.entity.hp <= 0 && step.action.type !== 'SWAP') { this.processQueueStep(queue, index + 1); return; }
        
        if (step.action.type === 'RUN') { this.terminateBattleScene(); }
        else if (step.action.type === 'SWAP') { 
            this.activePlayerMon = this.playerParty[step.action.index]; 
            this.combatLogFeed = `Signature swap execution. Appending: ${this.activePlayerMon.name}!`; 
            this.dialogue.innerText = this.combatLogFeed; 
            setTimeout(() => this.processQueueStep(queue, index + 1), 1400); 
        }
        else if (step.action.type === 'ITEM') { 
            this.inventory[step.action.name]--; 
            this.activePlayerMon.hp = Math.min(this.activePlayerMon.maxHp, this.activePlayerMon.hp + 30); 
            this.combatLogFeed = `Nano-Repair sequence initialized. +30 HP committed to ${this.activePlayerMon.name}.`; 
            this.dialogue.innerText = this.combatLogFeed; 
            setTimeout(() => this.processQueueStep(queue, index + 1), 1400); 
        } 
        else if (step.action.type === 'CAPTURE') { 
            this.inventory[step.action.name]--; 
            if (this.isBossBattle) { 
                this.combatLogFeed = `COMPILING FAILED: BOSS NODE SECURITY LOCK ACTIVE.`; 
                this.dialogue.innerText = this.combatLogFeed; 
                setTimeout(() => this.processQueueStep(queue, index + 1), 1400); return; 
            } 
            let caught = Math.random() * 255 < ((3 * this.enemyMon.maxHp - 2 * this.enemyMon.hp) * this.enemyMon.syncRate) / (3 * this.enemyMon.maxHp); 
            if (caught) { 
                this.combatLogFeed = `Core parsed cleanly! Linked ${this.enemyMon.name} to active stack.`; 
                this.dialogue.innerText = this.combatLogFeed; 
                this.playerParty.push(this.enemyMon); 
                this.saveProfileToStorage(); 
                setTimeout(() => this.terminateBattleScene(), 1600); 
            } else { 
                this.combatLogFeed = `Link Card failed! Structural boundaries retained.`; 
                this.dialogue.innerText = this.combatLogFeed; 
                setTimeout(() => this.processQueueStep(queue, index + 1), 1400); 
            } 
        }
        else if (step.action.type === 'MOVE') { 
            let move = step.action.object; 
            SoundFX.play('hit');
            let targetX = step.target === this.enemyMon ? 380 : 130;
            let targetY = step.target === this.enemyMon ? 90 : 210;
            this.spawnImpactParticles(targetX, targetY, step.entity.color);

            if (move.selfBuff) {
                step.entity.isOverclocked = true;
                this.combatLogFeed = `${step.entity.name} used ${move.name}!\nAttack parameters boosted by 150%!`;
            } else {
                let result = this.evaluateDamageCalculation(step.entity, step.target, move); 
                if (move.drains) { 
                    let siphon = Math.floor(result.damage / 2); step.entity.hp = Math.min(step.entity.maxHp, step.entity.hp + siphon); 
                    this.combatLogFeed = `${step.entity.name} used ${move.name}! ${result.log}\nSiphoned +${siphon} HP.`;
                } else { 
                    this.combatLogFeed = `${step.entity.name} used ${move.name}!\n${result.log}`; 
                }
            }

            this.dialogue.innerText = this.combatLogFeed;
            if (step.target.hp <= 0) { setTimeout(() => { if (step.target === this.enemyMon) this.processMatchVictory(); else this.handleActiveFaintRouting(); }, 1400); return; }
            setTimeout(() => this.processQueueStep(queue, index + 1), 1400); 
        }
    },

    evaluateDamageCalculation(attacker, defender, move) { 
        let modifier = (TYPE_CHART[move.type] && TYPE_CHART[move.type][defender.type] !== undefined) ? TYPE_CHART[move.type][defender.type] : 1; 
        let baseDmg = Math.floor(((2 * attacker.level / 5 + 2) * move.power * (attacker.atk / defender.def)) / 50) + 2; 
        let finalDmg = Math.floor(baseDmg * modifier); 
        if (attacker.isOverclocked) finalDmg = Math.floor(finalDmg * 1.5); 
        defender.hp = Math.max(0, defender.hp - finalDmg); 
        
        if (move.status && !defender.status && Math.random() < 0.4) {
            defender.status = move.status;
        }

        let logOut = `Dealt ${finalDmg} structural damage.`;
        if(modifier > 1) logOut += " [CRITICAL ELEMENTAL MULTIPLIER]";
        if(modifier < 1 && move.type !== "Primal") logOut += " [TARGET BUFFER INSULATED]";
        if(defender.status) logOut += ` [STATUS: ${defender.status}]`;
        return { damage: finalDmg, log: logOut }; 
    },

    evaluateOverclockTriggers() { 
        if (this.isBossBattle && this.activeBossSpecies === "A.E.G.I.S. Prime" && !this.enemyMon.isOverclocked) { 
            let ratio = this.enemyMon.hp / this.enemyMon.maxHp; 
            if (ratio <= 0.50 && this.enemyMon.hp > 0) { 
                this.enemyMon.isOverclocked = true; 
                this.dialogue.innerText = "!!! CRITICAL SYSTEM WARNING !!!\nA.E.G.I.S. PRIME ENGAGING SYSTEM OVERCLOCK! ATTACK SCALED BY 150%!"; 
                setTimeout(() => { this.inputLock = false; this.initBattleUI(); }, 2200); return; 
            } 
        } 
        this.inputLock = false; 
        this.dialogue.innerText = "Select next command protocol instruction:"; 
        this.initBattleUI(); 
    },

    handleActiveFaintRouting() { let alive = this.playerParty.find(m => m.hp > 0); if (alive) { this.inputLock = false; this.initBattleUI(); } else { this.processMatchFailure(); } },

    processMatchVictory() {
        if (this.isBossBattle && this.activeBossSpecies === "A.E.G.I.S. Prime") { 
            this.dialogue.innerText = "A.E.G.I.S. PRIME DEFEATED!\nMainframe environmental structure fully liberated!"; 
            this.buttonsContainer.innerHTML = ""; 
            setTimeout(() => { 
                this.gameState = "GAME_OVER"; 
                this.dialogue.innerText = "PARADOX RECONCILED PERMANENTLY.\nYou have freed the entire Grid and destroyed A.E.G.I.S. Prime. Victory!"; 
                localStorage.removeItem("matrixquest2_save"); 
            }, 3000); 
        } 
        else {
            let shardPayout = Math.floor(this.enemyMon.level * (this.isBossBattle ? 12 : 5)); this.linkDataFragments += shardPayout; 
            let upgradeMessage = "";
            if (this.activeBossSpecies === "Kernel Sentinel") { this.inventory["Override Key"] = 1; upgradeMessage = "\n[ITEM ACQUIRED]: Obtained OVERCLOCK OVERRIDE KEY."; }
            this.dialogue.innerText = `${this.enemyMon.name} offline.\nHarvested +${shardPayout}F Shards.${upgradeMessage}`;
            setTimeout(() => {
                let exp = this.enemyMon.level * 18; let evolutionLog = this.activePlayerMon.gainExp(exp);
                this.saveProfileToStorage();
                if (evolutionLog !== "") { this.dialogue.innerText = evolutionLog; setTimeout(() => this.terminateBattleScene(), 2500); } else { this.terminateBattleScene(); }
            }, 1400);
        }
    },

    processMatchFailure() { 
        this.dialogue.innerText = "Stack overflow fatal warning! Returning to Undergrid Sanctuary."; 
        this.playerParty.forEach(m => m.hp = m.maxHp); 
        this.activePlayerMon = this.playerParty[0]; 
        this.playerGridPos = { x: 4, y: 5 }; 
        this.pixelPos = { x: 4 * 32, y: 5 * 32 }; 
        this.terminateBattleScene(); 
    },

    terminateBattleScene() { this.gameState = "OVERWORLD"; this.ui.style.display = "grid"; this.inputLock = false; this.enemyMon = null; this.isBossBattle = false; this.activeBossSpecies = ""; this.render(); },

    drawSelectionBackgroundLayout() {
        this.ctx.fillStyle = "#020306"; this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        this.ctx.strokeStyle = "rgba(0, 240, 255, 0.08)"; this.ctx.lineWidth = 1;
        for(let i=0; i<this.canvas.width; i+=16) { this.ctx.beginPath(); this.ctx.moveTo(i,0); this.ctx.lineTo(i,this.canvas.height); this.ctx.stroke(); }
        this.ctx.fillStyle = "rgba(0, 240, 255, 0.02)"; this.ctx.fillRect(40, 40, this.canvas.width - 80, this.canvas.height - 80);
    },

    render() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); 
        if (this.gameState === "STARTER_SELECT") {
            this.drawSelectionBackgroundLayout();
        } else if (this.gameState === "BATTLE") {
            this.drawBattleLayout();
        } else if (this.gameState === "OVERWORLD" || this.gameState === "TEXT_BOX" || this.gameState === "SHOP_MENU" || this.gameState === "TRANSITION") {
            this.drawTilemap();
        }

        if (this.gameState === "TRANSITION") { 
            let color = this.isBossBattle ? "255, 0, 85" : "0, 240, 255"; 
            this.ctx.fillStyle = `rgba(${color}, ${this.transitionTimer / 100})`; 
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height); 
        }
    }
};

document.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => { Game.init(); }, 50);
});
</script>
